<!-- CHAT ADMIN WIDGET -->
<div class="chat-widget">
  <input type="text" placeholder="Tulis pesan ke admin..." id="chatInput" />

  <button id="chatSend">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="10"></circle>
      <path d="M12 8v8"></path>
      <path d="M8 12h8"></path>
    </svg>
  </button>
</div>

<style>
  .chat-widget {
    width: min(92vw, auto);
    margin: 24px auto;
    display: flex;
    align-items: center;
    padding: 6px;

    border-radius: 999px;

    background: rgba(255, 255, 255, 0.08);
    border: 2px solid #9b6dff;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.05) inset,
      0 10px 30px rgba(0, 0, 0, 0.25);
  }

  .chat-widget input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;

    color: #fff;
    font-size: 15px;

    padding: 12px 18px;
    font-family: inherit;
  }

  .chat-widget input::placeholder {
    color: rgba(255, 255, 255, 0.6);
  }

  .chat-widget button {
    width: 42px;
    height: 42px;
    border: none;
    cursor: pointer;

    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    color: white;

    background: radial-gradient(
      circle at top left,
      #caa7ff,
      #9b6dff 60%,
      #7c4dff
    );

    box-shadow:
      0 4px 12px rgba(155, 109, 255, 0.45),
      inset 0 1px 3px rgba(255, 255, 255, 0.3);

    transition: 0.25s ease;
  }

  .chat-widget button:hover {
    transform: scale(1.08);
  }

  .chat-widget button:active {
    transform: scale(0.96);
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .chat-widget {
      padding: 5px;
    }

    .chat-widget input {
      font-size: 14px;
      padding: 11px 16px;
    }

    .chat-widget button {
      width: 40px;
      height: 40px;
    }
  }
</style>

<script>
  document.getElementById('chatSend').addEventListener('click', function () {
    const text = document.getElementById('chatInput').value.trim();

    if (!text) return;

    // ganti nomor admin
    const adminNumber = '628119950205';

    const url = `https://wa.me/${adminNumber}?text=` + encodeURIComponent(text);

    window.open(url, '_blank');
  });
</script>
